workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1

    scripts:
      - name: Clean old files
        script: |
          flutter clean

      - name: Re-create Android folder (FIX FOR ALL GRADLE/KOTLIN ERRORS)
        script: |
          flutter create .

      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
